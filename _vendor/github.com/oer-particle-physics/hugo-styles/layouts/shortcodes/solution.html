{{- $body := partial "utils/render-shortcode-body.html" (dict "Inner" .Inner "Page" .Page) -}}
<section class="hx:mt-6">
  <details class="lesson-disclosure lesson-disclosure-solution" data-lesson-disclosure="solution">
    <summary class="lesson-disclosure-summary">
      <span class="lesson-disclosure-icon" aria-hidden="true">
        {{ partial "utils/icon.html" (dict "name" "badge-check" "attributes" "height=18") }}
      </span>
      <span class="lesson-disclosure-copy">
        <span class="lesson-disclosure-title">{{ .Get "title" | default "Show solution" }}</span>
      </span>
      <span class="lesson-disclosure-chevron" aria-hidden="true">▾</span>
    </summary>
    <div class="lesson-disclosure-body">
      <div class="lesson-rich-content">{{- $body -}}</div>
    </div>
  </details>
</section>
