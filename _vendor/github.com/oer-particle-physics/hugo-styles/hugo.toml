baseURL = "https://oer-particle-physics.github.io/hugo-styles/"
title = "Hugo Styles"
locale = "en-US"
enableGitInfo = false
disableKinds = ["taxonomy", "term", "RSS"]

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      definitionList = true
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [["\\[", "\\]"], ["$$", "$$"]]
          inline = [["\\(", "\\)"]]
    [markup.goldmark.renderer]
      unsafe = true

[params.lesson]
  title = "Hugo Styles"
  description = "Reusable lesson infrastructure with challenge blocks, audience-aware content, aggregated teaching resources, and a thin updateable template."
  contact = "team@example.org"
  repo = "https://github.com/oer-particle-physics/hugo-styles"
  editBranch = "main"
  docsRepo = "https://github.com/oer-particle-physics/hugo-styles"
  copyrightHolder = "the authors"
  licenseName = "CC BY 4.0"
  licenseURL = "https://creativecommons.org/licenses/by/4.0/"
  lifecycle = "stable"
  defaultView = "learner"
  enableSidebarNumbering = true
  analytics = ""

[params.navbar]
  displayTitle = true
  displayLogo = false
  width = "wide"

[params.search]
  enable = true
  type = "flexsearch"

  [params.search.flexsearch]
    index = "content"
    js = "js/vendor/flexsearch.bundle.min.js"
    maxPageResults = 12
    maxSectionResults = 8

[params.page.tabs]
  sync = true

[params.footer]
  displayPoweredBy = false
  displayCopyright = false

[params.versioning]
  enable = true
  defaultBranch = "main"
  menuName = "Versions"
  menuIdentifier = "versions"
  menuWeight = 70

  [params.versioning.latest]
    enable = true
    label = "Latest"

  [params.versioning.branches]
    refs = []
    patterns = []
    all = false

  [params.versioning.tags]
    refs = []
    patterns = []
    all = false

