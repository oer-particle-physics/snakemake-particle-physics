baseURL = "https://example.github.io/example-lesson/"
title = "Example Lesson"
languageCode = "en-us"
enableGitInfo = true
disableKinds = ["taxonomy", "term", "RSS"]

[module]
  [[module.imports]]
    path = "github.com/oer-particle-physics/hugo-styles"
    [[module.imports.mounts]]
      source = "archetypes"
      target = "archetypes"
    [[module.imports.mounts]]
      source = "assets"
      target = "assets"
    [[module.imports.mounts]]
      source = "layouts"
      target = "layouts"
    [[module.imports.mounts]]
      source = "static"
      target = "static"
    [[module.imports.mounts]]
      source = "package.json"
      target = "assets/_jsconfig/package.json"

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      definitionList = true
    [markup.goldmark.renderer]
      unsafe = true

[params.lesson]
  title = "Example Lesson"
  tagline = "A thin downstream lesson built on the shared hugo-styles module."
  description = "Replace this metadata with your own tutorial details."
  contact = "team@example.org"
  repo = "https://github.com/oer-particle-physics/hugo-styles-template"
  docsRepo = "https://github.com/oer-particle-physics/hugo-styles-template"
  editBranch = "main"
  copyrightHolder = "the authors"
  licenseName = "CC BY 4.0"
  licenseURL = "https://creativecommons.org/licenses/by/4.0/"
  lifecycle = "alpha"
  defaultView = "learner"
  enableSidebarNumbering = true

[params.navbar]
  displayTitle = true
  displayLogo = false

[params.search]
  enable = true
  type = "flexsearch"

  [params.search.flexsearch]
    index = "content"
    js = "js/vendor/flexsearch.bundle.min.js"
    maxPageResults = 12
    maxSectionResults = 8

[params.page.tabs]
  sync = true

[params.footer]
  displayPoweredBy = false
  displayCopyright = false

[params.versioning]
  enable = true
  defaultBranch = "main"
  menuName = "Versions"
  menuIdentifier = "versions"
  menuWeight = 70

  [params.versioning.latest]
    enable = true
    label = "Latest"

  [params.versioning.branches]
    refs = []
    patterns = []
    all = false

  [params.versioning.tags]
    refs = []
    patterns = []
    all = false

