baseURL = "https://oer-particle-physics.github.io/snakemake-particle-physics/"
title = "Snakemake for Particle Physics"
languageCode = "en-gb"
enableGitInfo = true
disableKinds = ["taxonomy", "term", "RSS"]

[module]
  [[module.imports]]
    path = "github.com/oer-particle-physics/hugo-styles"
    [[module.imports.mounts]]
      source = "archetypes"
      target = "archetypes"
    [[module.imports.mounts]]
      source = "assets"
      target = "assets"
    [[module.imports.mounts]]
      source = "layouts"
      target = "layouts"
    [[module.imports.mounts]]
      source = "static"
      target = "static"
    [[module.imports.mounts]]
      source = "package.json"
      target = "assets/_jsconfig/package.json"

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      definitionList = true
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [["\\[", "\\]"], ["$$", "$$"]]
          inline = [["\\(", "\\)"]]
    [markup.goldmark.renderer]
      unsafe = true

[params.lesson]
  title = "Snakemake for Particle Physics"
  tagline = "An introduction to Snakemake for particle physics data analysis."
  description = "This lesson provides an introduction to Snakemake, a workflow management system, and how it can be used for particle physics data analysis. It covers the basics of Snakemake, including how to define rules, manage dependencies, and execute workflows. The lesson also includes practical examples and exercises to help learners get hands-on experience with Snakemake in the context of particle physics."
  contact = "clemens.lange@cern.ch"
  repo = "https://github.com/oer-particle-physics/snakemake-particle-physics"
  docsRepo = "https://github.com/oer-particle-physics/snakemake-particle-physics"
  editBranch = "main"
  copyrightHolder = "Clemens Lange"
  licenseName = "CC BY 4.0"
  licenseURL = "https://creativecommons.org/licenses/by/4.0/"
  lifecycle = "alpha"
  defaultView = "learner"
  enableSidebarNumbering = true

[params.navbar]
  displayTitle = true
  displayLogo = false

[params.search]
  enable = true
  type = "flexsearch"

  [params.search.flexsearch]
    index = "content"
    js = "js/vendor/flexsearch.bundle.min.js"
    maxPageResults = 12
    maxSectionResults = 8

[params.page.tabs]
  sync = true

[params.footer]
  displayPoweredBy = false
  displayCopyright = false

[params.versioning]
  enable = true
  defaultBranch = "main"
  menuName = "Versions"
  menuIdentifier = "versions"
  menuWeight = 70

  [params.versioning.latest]
    enable = true
    label = "Latest"

  [params.versioning.branches]
    refs = []
    patterns = []
    all = false

  [params.versioning.tags]
    refs = []
    patterns = []
    all = false

