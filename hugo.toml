  [[menus.main]]
    name = "Setup"
    parent = "learners"
    pageRef = "/learners/setup"
    weight = 20
  [[menus.main]]
    name = "Key Points"
    parent = "resources"
    pageRef = "/key-points"
    weight = 10
  [[menus.main]]
    name = "All-in-One"
    parent = "resources"
    pageRef = "/all-in-one"
    weight = 20
  [[menus.main]]
    name = "External Links"
    parent = "resources"
